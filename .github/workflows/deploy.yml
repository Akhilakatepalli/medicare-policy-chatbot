name: Build and Deploy Policy Chatbot

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: policy-chatbot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push chatbot image
        run: |
          docker build \
            -t $REGISTRY/$PROJECT_ID/$REPOSITORY/chatbot-api:$GITHUB_SHA \
            -t $REGISTRY/$PROJECT_ID/$REPOSITORY/chatbot-api:latest \
            .
          docker push $REGISTRY/$PROJECT_ID/$REPOSITORY/chatbot-api:$GITHUB_SHA
          docker push $REGISTRY/$PROJECT_ID/$REPOSITORY/chatbot-api:latest

      - name: Update image tag in values.yaml
        run: |
          sed -i "s|tag: .*|tag: $GITHUB_SHA|g" helm/policy-chatbot/values.yaml

      - name: Commit updated values.yaml back to GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/policy-chatbot/values.yaml
          git diff --staged --quiet || git commit -m "ci: update chatbot image tag to $GITHUB_SHA [skip ci]"
          git push
